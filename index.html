<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Mortal Kombat 1 — Fight Generator</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--blood:#AA0000;--gold:#C8A84B;--dark:#080503;--panel:#100806;--card:#181008;--border:#2E1810;--text:#F0E8D8;--dim:#6A5040;}
body{background:var(--dark);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 12px 60px;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 55% 30% at 15% 5%,rgba(170,0,0,0.1) 0%,transparent 65%),radial-gradient(ellipse 45% 25% at 85% 85%,rgba(200,168,75,0.05) 0%,transparent 65%);pointer-events:none;z-index:0;}
.header{text-align:center;position:relative;z-index:1;margin-bottom:6px;}
.title{font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,9vw,4.5rem);letter-spacing:0.08em;color:var(--text);text-shadow:0 0 30px rgba(170,0,0,0.5);line-height:1;}
.title span{color:var(--blood);}
.subtitle{font-size:0.68rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--dim);margin-top:5px;}
.patch-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(170,0,0,0.12);border:1px solid rgba(170,0,0,0.3);border-radius:20px;padding:4px 12px;font-size:0.65rem;letter-spacing:0.12em;text-transform:uppercase;color:#FF8866;margin-top:8px;}
.card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:20px 16px;width:100%;max-width:800px;position:relative;z-index:1;margin-top:18px;}
.filter-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.pill{font-size:0.67rem;letter-spacing:0.1em;text-transform:uppercase;padding:5px 11px;border-radius:20px;border:1px solid var(--border);background:#0A0806;color:var(--dim);cursor:pointer;transition:all 0.12s;-webkit-tap-highlight-color:transparent;}
.pill:hover,.pill:active{border-color:var(--blood);color:var(--text);}
.pill.active{background:var(--blood);border-color:var(--blood);color:#fff;}
.pill.dlc.active{background:#6B0FBB;border-color:#6B0FBB;}
.pill.guest.active{background:#C8A84B;border-color:#C8A84B;color:#000;}
.search-wrap{position:relative;margin-bottom:12px;}
.hero-search{width:100%;background:#0A0806;border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Inter',sans-serif;font-size:0.9rem;padding:11px 14px 11px 38px;outline:none;transition:border-color 0.15s;}
.hero-search:focus{border-color:var(--blood);}
.hero-search::placeholder{color:var(--dim);}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:0.85rem;pointer-events:none;}
.btn-wrap{display:flex;justify-content:center;}
.btn-gen{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:0.1em;background:linear-gradient(135deg,#880000,#CC0000);color:#fff;border:none;border-radius:8px;padding:14px 40px;cursor:pointer;transition:transform 0.12s,box-shadow 0.15s;-webkit-tap-highlight-color:transparent;width:100%;max-width:320px;}
.btn-gen:hover{transform:scale(1.03);box-shadow:0 0 22px rgba(170,0,0,0.5);}
.btn-gen:active{transform:scale(0.97);}
#result{display:none;flex-direction:column;gap:14px;margin-top:20px;}
.fight-row{display:grid;grid-template-columns:1fr 44px 1fr;align-items:start;gap:4px;}
.fighter-panel{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 12px;display:flex;flex-direction:column;align-items:center;gap:5px;text-align:center;}
.fp-owner{font-size:0.58rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--dim);}
.fp-name{font-family:'Bebas Neue',sans-serif;font-size:clamp(1rem,4vw,1.5rem);letter-spacing:0.05em;color:var(--text);line-height:1.1;}
.fp-origin{font-size:0.62rem;letter-spacing:0.1em;text-transform:uppercase;padding:3px 8px;border-radius:10px;background:rgba(170,0,0,0.15);color:#FF8866;}
.fp-kameo{font-size:0.62rem;letter-spacing:0.08em;padding:3px 8px;border-radius:10px;background:rgba(200,168,75,0.15);color:var(--gold);margin-top:2px;}
.fp-badges{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;margin-top:2px;}
.badge{font-size:0.5rem;letter-spacing:0.08em;text-transform:uppercase;padding:1px 5px;border-radius:4px;font-weight:600;}
.badge.dlc{background:rgba(107,15,187,0.25);color:#CC88FF;}
.badge.guest{background:rgba(200,168,75,0.2);color:var(--gold);}
.badge.mk{background:rgba(170,0,0,0.2);color:#FF8888;}
.badge.ninja{background:rgba(0,100,200,0.2);color:#88AAFF;}
.vs-col{display:flex;align-items:center;justify-content:center;padding-top:16px;}
.vs-badge{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:var(--blood);text-shadow:0 0 10px rgba(170,0,0,0.5);}
/* Kameo selector */
.kameo-row{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 12px;}
.kameo-title{font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);margin-bottom:10px;font-weight:600;}
.kameo-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.kameo-box{text-align:center;}
.kameo-label{font-size:0.58rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--dim);margin-bottom:4px;}
.kameo-name{font-family:'Bebas Neue',sans-serif;font-size:0.95rem;letter-spacing:0.05em;color:var(--gold);}
.scenario-box{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--blood);border-radius:10px;padding:16px 14px;}
.scenario-label{font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--blood);margin-bottom:8px;font-weight:600;}
.scenario-text{font-size:0.85rem;line-height:1.65;color:#B09080;}
.cursor{display:inline-block;width:2px;height:0.85em;background:var(--blood);margin-left:2px;vertical-align:text-bottom;animation:blink 0.7s steps(1) infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

/* ── TTS button ── */
.tts-btn{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);
  border-radius:20px;padding:6px 14px;cursor:pointer;
  font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;
  color:#AAA;transition:all 0.15s;margin-top:10px;
  -webkit-tap-highlight-color:transparent;user-select:none;
}
.tts-btn:hover{background:rgba(255,255,255,0.1);color:#FFF;border-color:rgba(255,255,255,0.25);}
.tts-btn.playing{color:#FFD700;border-color:rgba(255,215,0,0.4);background:rgba(255,215,0,0.08);}
.tts-btn.loading{opacity:0.6;cursor:wait;}
</style>
</head>
<body>
<div class="header">
  <div class="title">MORTAL <span>KOMBAT</span> 1</div>
  <div class="subtitle">Fight Generator — Joe vs CPU</div>
  <div class="patch-badge">🔴 Kombat Pack 2 · 34 Fighters + Kameos</div>
</div>
<div class="card">
  <div class="filter-row">
    <div class="pill active" data-filter="all">All</div>
    <div class="pill" data-filter="ninja">Ninjas</div>
    <div class="pill" data-filter="outworld">Outworld</div>
    <div class="pill" data-filter="earthrealm">Earthrealm</div>
    <div class="pill dlc" data-filter="dlc">DLC / KP</div>
    <div class="pill guest" data-filter="guest">Guest Fighters</div>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="hero-search" id="heroSearch" type="text" placeholder="Search fighters..." autocomplete="off">
  </div>
  <div class="btn-wrap">
    <button class="btn-gen" id="genBtn">💀 GENERATE FIGHT</button>
  </div>
  <div id="result">
    <div class="fight-row">
      <div class="fighter-panel">
        <div class="fp-owner">Joe plays</div>
        <div class="fp-name" id="nameJoe">—</div>
        <div class="fp-origin" id="originJoe"></div>
        <div class="fp-kameo" id="kameoJoe"></div>
        <div class="fp-badges" id="badgesJoe"></div>
      </div>
      <div class="vs-col"><div class="vs-badge">VS</div></div>
      <div class="fighter-panel">
        <div class="fp-owner">CPU plays</div>
        <div class="fp-name" id="nameCpu">—</div>
        <div class="fp-origin" id="originCpu"></div>
        <div class="fp-kameo" id="kameoCpu"></div>
        <div class="fp-badges" id="badgesCpu"></div>
      </div>
    </div>
    <div class="kameo-row">
      <div class="kameo-title">⚡ Suggested Kameos</div>
      <div class="kameo-grid">
        <div class="kameo-box"><div class="kameo-label">Joe's Kameo</div><div class="kameo-name" id="kameoNameJoe">—</div></div>
        <div class="kameo-box"><div class="kameo-label">CPU's Kameo</div><div class="kameo-name" id="kameoNameCpu">—</div></div>
      </div>
    </div>
    <div class="scenario-box">
      <div class="scenario-label">☠ Kombat Scenario</div>
      <div class="scenario-text" id="scenarioText"></div>
      <button class="tts-btn" id="ttsBtn" style="display:none" onclick="(function(b){const t=document.getElementById(\'scenarioText\');speakScenario(b,t.innerText);})(this)">🔊 Read Aloud</button>
    </div>
  </div>
</div>
<script>
const FIGHTERS = [
  // Base 22
  {n:"Liu Kang",       origin:"Earthrealm / Fire God", tags:["earthrealm"]},
  {n:"Scorpion",       origin:"Shirai Ryu",            tags:["ninja","earthrealm"]},
  {n:"Sub-Zero",       origin:"Lin Kuei",              tags:["ninja","earthrealm"]},
  {n:"Raiden",         origin:"Earthrealm",            tags:["earthrealm"]},
  {n:"Kung Lao",       origin:"Earthrealm",            tags:["earthrealm"]},
  {n:"Kitana",         origin:"Outworld",              tags:["outworld"]},
  {n:"Mileena",        origin:"Outworld",              tags:["outworld"]},
  {n:"Baraka",         origin:"Outworld / Tarkatan",   tags:["outworld"]},
  {n:"Geras",          origin:"Keeper of Time",        tags:[]},
  {n:"Kenshi",         origin:"Earthrealm",            tags:["earthrealm"]},
  {n:"Syzoth (Reptile)",origin:"Zaterra",              tags:["outworld"]},
  {n:"Shang Tsung",    origin:"Outworld",              tags:["outworld"]},
  {n:"Li Mei",         origin:"Outworld / Sun Do",     tags:["outworld"]},
  {n:"Tanya",          origin:"Edenia",                tags:["outworld"]},
  {n:"Rain",           origin:"Edenia",                tags:["outworld"]},
  {n:"Johnny Cage",    origin:"Earthrealm",            tags:["earthrealm"]},
  {n:"Sindel",         origin:"Edenia / Outworld",     tags:["outworld"]},
  {n:"Smoke",          origin:"Lin Kuei",              tags:["ninja","earthrealm"]},
  {n:"Nitara",         origin:"Vaeternus",             tags:[]},
  {n:"General Shao",   origin:"Outworld",              tags:["outworld"]},
  {n:"Reiko",          origin:"Outworld",              tags:["outworld"]},
  {n:"Ashrah",         origin:"Netherrealm",           tags:[]},
  {n:"Havik",          origin:"Chaos Realm",           tags:[]},
  // Kombat Pack 1 DLC
  {n:"Omni-Man",       origin:"Viltrumite / Invincible",tags:["dlc","guest"]},
  {n:"Homelander",     origin:"The Boys",              tags:["dlc","guest"]},
  {n:"Peacemaker",     origin:"DC Comics",             tags:["dlc","guest"]},
  {n:"Ermac",          origin:"Outworld / Soul Collection",tags:["dlc","outworld"]},
  {n:"Quan Chi",       origin:"Netherrealm",           tags:["dlc"]},
  {n:"Takeda",         origin:"Earthrealm / Shirai Ryu",tags:["dlc","earthrealm","ninja"]},
  // Khaos Reigns expansion
  {n:"Cyrax",          origin:"Lin Kuei",              tags:["dlc","ninja","earthrealm"]},
  {n:"Sektor",         origin:"Lin Kuei",              tags:["dlc","ninja","earthrealm"]},
  {n:"Noob Saibot",    origin:"Netherrealm",           tags:["dlc","ninja"]},
  {n:"Ghostface",      origin:"Scream",                tags:["dlc","guest"]},
  {n:"T-1000",         origin:"Terminator 2",          tags:["dlc","guest"]},
  {n:"Conan the Barbarian",origin:"Hyborian Age",      tags:["dlc","guest"]},
];

const KAMEOS = [
  "Scorpion","Sub-Zero","Kung Lao","Kano","Sonya Blade","Jax Briggs",
  "Frost","Johnny Cage","Cyrax","Sektor","Shujinko","Darrius","Motaro",
  "Stryker","Tremor","Mavado","Ferra","Khameleon","Janet Cage",
  "Madam Bo","Goro","Sareena",
];

const SCENARIOS = [
  "Liu Kang's new timeline was supposed to be perfect. It wasn't. Two warriors who should never have met in this reality have been pulled toward the same convergence point by a crack in the timeline's foundation. The fire god himself cannot stop what's already in motion. Only one of them walks away from this.",
  "The Mortal Kombat tournament has been called. Liu Kang chose the champions. But someone has been manipulating the bracket from the shadows — pulling warriors from different factions into the same bracket position. This match wasn't scheduled. It wasn't sanctioned. It's happening anyway.",
  "Shang Tsung's soul collection is expanding beyond Outworld. He needs souls from this specific era of Liu Kang's timeline, and he's engineered this fight to claim two of the most powerful ones in the same moment. Both fighters can feel something wrong with this arena. They're fighting it anyway.",
  "The Netherrealm doesn't wait for permission. Quan Chi's machinations have placed two warriors in a pocket of dead reality where neither realm has jurisdiction. The only way out is through the other fighter. Shinnok's influence bleeds through the walls. Both of them can hear it.",
  "General Shao's coup didn't end with Outworld's throne. The ripple effects are still moving through the realms. Two warriors caught in the political fallout have been left with no allies and no exit from this arena. Whatever loyalty they had to their factions means nothing here.",
  "The Lin Kuei and Shirai Ryu have fought across every timeline Liu Kang has constructed. This version was supposed to be different — the clans at peace, a new era. Then this happened. Old instincts don't care about new timelines. The muscle memory knows what to do.",
  "Omni-Man doesn't understand what this tournament is. He doesn't care. The Viltrumite Empire has sent him to assess the strength of this universe's warriors, and the assessment tool is simple — a fight to the limit. The warrior on the other side of the arena is about to find out exactly what a Viltrumite considers a limit.",
  "Ghostface showed up in Liu Kang's timeline like a virus in a perfect system — something that doesn't belong, operating on rules nobody here understands. The warrior chosen to stop them was given one instruction: don't let this escalate. The instruction was given before anyone saw what Ghostface could actually do.",
  "The T-1000 has been sent back. Not to Earthrealm. Not to any timeline that makes sense from the outside. The targeting system locked onto the wrong coordinates and ended up here, in Liu Kang's reconstructed realm, with a mission it will complete regardless of what the mission was originally for. The nearest fighter is now the obstacle.",
  "Conan the Barbarian has survived sorcerers, gods, and demon armies across the Hyborian Age. The portal that brought him here isn't something he can explain. The warrior standing across the arena isn't something he's ever seen. Neither of those things changes anything. He's been in worse situations than this.",
  "Homelander landed in Outworld looking for someone to impress. There's nobody here who knows who he is. There's no audience. No cameras. Just a warrior who refuses to look scared. That alone makes this personal.",
  "Peacemaker's mission parameters didn't include dimensional travel. They also didn't include fighting warriors from a fictional timeline. They do include: complete the mission by whatever means necessary. He's improvising. The warrior on the other side is not impressed.",
  "Ermac carries thousands of souls. Every one of them has fought in arenas like this one. The collective memory knows every technique, every opening, every mistake the other fighter is about to make. The other fighter doesn't know any of this. The first exchange is going to be educational.",
  "Takeda came to Liu Kang's timeline with a specific target. The person in front of him is not that target. But the path to the target goes through this arena, and this warrior is in the way. Takeda has his father's stubbornness and his mother's precision. That combination doesn't move around obstacles.",
  "Noob Saibot exists in the space between life and death, between light and darkness. In Liu Kang's rebuilt timeline, that space is thinner than it should be. The shadow clone technology lets him be in two places at once — which means the warrior fighting him is never entirely sure which one is real.",
  "Cyrax's targeting systems have been compromised. The reboot didn't fully take. She knows who she's supposed to be fighting and why, but the Lin Kuei programming underneath keeps surfacing between strikes. The warrior she's facing can see the conflict in her movement patterns. That's either an advantage or a liability, depending on how the fight goes.",
  "The timeline has a crack in it. It runs directly through this arena. Two fighters from different points in Liu Kang's reconstructed history have been pulled into the same moment — the past and the present of the same story, finally colliding. Liu Kang is watching from somewhere above. He already knows the outcome. He's letting it happen anyway.",
  "Raiden is no longer a god in this timeline. He's something different — mortal, capable of dying, carrying the weight of every mistake from every previous timeline in a mind that can remember all of them. The warrior in front of him represents one of those mistakes. This fight is a correction.",
  "Sindel's authority in Outworld is absolute. It was absolute. The political landscape of Liu Kang's new timeline is shifting and her position is no longer as secure as it was. The warrior she's fighting today knows something she doesn't want known. The arena was her choice. The outcome is non-negotiable.",
  "Kitana and Mileena were supposed to be on the same side in this new timeline. Then a decision was made by one of them that the other can't forgive. Liu Kang didn't cause this. The crack in their relationship predates his timeline. This fight predates this fight.",
  "Geras has died more times than he can count. Each death is information. Each time he comes back, he knows more about what killed him last time. The warrior fighting him is already on a timer — not because they're losing, but because Geras has been studying the patterns since the fight started, and the opening he's been waiting for is about to appear.",
  "Kenshi was blind before the sword. The sword changed what blind means for him. The psychic resonance of the arena tells him more about the other fighter than sight ever could — movement patterns, hesitation points, the exact moment they decide to commit. He already knows. He's waiting for them to not know that he knows.",
  "Johnny Cage wasn't supposed to matter in any of the previous timelines. He wasn't the chosen warrior, wasn't the strongest, wasn't the most powerful. He survived anyway. He's still here. The warrior fighting him is about to find out what it means to underestimate someone who's survived everything the universe has thrown at him.",
  "Havik doesn't want to win. Havik wants to break the rules of how fighting works in this arena. Every kombatant who enters here accepts the implicit framework — attack, defend, finish. Havik rejects the framework. The warrior fighting him is about to discover what a fight looks like when one participant is actively trying to destroy the concept of winning.",
  "Shang Tsung has stolen the faces of everyone in this arena at least once. He is never not himself, and he is never only himself. The warrior fighting him doesn't know which techniques to expect because there are no Shang Tsung techniques — only every technique from every soul he's ever consumed. All of them are available right now.",
  "Scorpion died in every timeline before this one. In this one, he is alive. The warrior fighting him is either responsible for something from a previous timeline that Scorpion's muscle memory still carries, or they're completely innocent and this is a case of wrong place, wrong moment in the wrong arena. Scorpion doesn't always make that distinction in time.",
  "Sub-Zero's ice is older than Liu Kang's timeline. The Lin Kuei's history runs deeper than the reconstruction. Whatever the fire god built on top of the old world, the cold underneath it didn't go away. Sub-Zero knows where the foundations are. The warrior fighting him is standing on one without knowing it.",
  "Baraka's people were almost wiped out. In every version of history that has ever existed, the Tarkatan are almost wiped out. The warrior in front of him is connected to a decision that, in some version of some timeline, contributed to that. Baraka doesn't need the specific version to be the current one. The instinct doesn't require accuracy.",
  "Rain believes he is an Edenian god. He might be right. The warrior fighting him is about to test that belief under the most direct conditions possible — not through debate, not through politics, but through every hydrokinetic ability Rain has developed across a lifetime of believing himself divine.",
  "The fight between these two was written into Liu Kang's timeline before either of them was placed in it. Destiny in this realm is not a metaphor — it's a structural feature. Both fighters can feel the inevitability of this moment pulling at them from opposite directions. Neither of them planned to be here. Both of them were always going to end up here.",
];

const SCENARIOS_GUEST = [
  "The portal deposited {GUEST} in Liu Kang's timeline without explanation. There was no briefing. No intelligence on what this world is or who these warriors are. The only thing that transferred through the portal was the instinct that got them here in the first place.",
  "{GUEST} has fought in their own universe long enough to know that the rules of combat are universal. Hit harder, move faster, don't stop until it's over. This arena runs on the same principles. The warrior on the other side operates on them too. The difference is in the details, and the details are about to sort themselves out.",
];

let activeFilter='all';
document.querySelectorAll('.pill').forEach(p=>{
  p.addEventListener('click',()=>{
    document.querySelectorAll('.pill').forEach(x=>x.classList.remove('active'));
    p.classList.add('active');activeFilter=p.dataset.filter;
  });
});
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function getPool(){
  const q=document.getElementById('heroSearch').value.toLowerCase().trim();
  return FIGHTERS.filter(h=>{
    if(q&&!h.n.toLowerCase().includes(q)) return false;
    if(activeFilter==='all') return true;
    return h.tags.includes(activeFilter);
  });
}
function randomKameo(){return KAMEOS[Math.floor(Math.random()*KAMEOS.length)];}
function typewrite(el,text,speed=14){el.innerHTML='';let i=0;const cur=document.createElement('span');cur.className='cursor';el.appendChild(cur);const tick=()=>{if(i<text.length){el.insertBefore(document.createTextNode(text[i++]),cur);setTimeout(tick,speed);}else{cur.remove();}};tick();}

document.getElementById('genBtn').addEventListener('click',()=>{
  const pool=getPool();
  if(pool.length<2){alert('Not enough fighters. Try All.');return;}
  const s=shuffle(pool);
  const f1=s[0],f2=s.find(c=>c.n!==f1.n);
  if(!f2){alert('Need at least 2 fighters.');return;}
  const [joe,cpu]=Math.random()<0.5?[f1,f2]:[f2,f1];

  document.getElementById('nameJoe').textContent=joe.n;
  document.getElementById('originJoe').textContent=joe.origin;
  document.getElementById('badgesJoe').innerHTML=joe.tags.filter(t=>['dlc','guest','ninja'].includes(t)).map(t=>`<span class="badge ${t}">${t}</span>`).join('');

  document.getElementById('nameCpu').textContent=cpu.n;
  document.getElementById('originCpu').textContent=cpu.origin;
  document.getElementById('badgesCpu').innerHTML=cpu.tags.filter(t=>['dlc','guest','ninja'].includes(t)).map(t=>`<span class="badge ${t}">${t}</span>`).join('');

  const jk=randomKameo(),ck=randomKameo();
  document.getElementById('kameoJoe').textContent='Kameo: '+jk;
  document.getElementById('kameoCpu').textContent='Kameo: '+ck;
  document.getElementById('kameoNameJoe').textContent=jk;
  document.getElementById('kameoNameCpu').textContent=ck;

  document.getElementById('result').style.display='flex';
  document.getElementById('ttsBtn').style.display='inline-flex';

  // use guest scenario if either fighter is a guest
  const hasGuest=joe.tags.includes('guest')||cpu.tags.includes('guest');
  let pool2=hasGuest?[...SCENARIOS,...SCENARIOS_GUEST]:SCENARIOS;
  let text=pool2[Math.floor(Math.random()*pool2.length)];
  const guestName=joe.tags.includes('guest')?joe.n:cpu.n;
  text=text.replace(/\{GUEST\}/g,guestName);
  typewrite(document.getElementById('scenarioText'),text);
});

document.getElementById('heroSearch').addEventListener('input',()=>{});
</script>

<script>
// ── TTS (OpenAI Nova via proxy) ───────────────────────────
const TTS_URL = 'https://tts-proxy-i1sn.onrender.com';
let ttsAudio = null;

async function speakScenario(btn, text) {
  // iOS audio unlock MUST happen synchronously before any await
  if (!ttsAudio) {
    ttsAudio = new Audio();
    ttsAudio.play().catch(()=>{});
    ttsAudio.pause();
  }

  // stop if already playing
  if (ttsAudio && !ttsAudio.paused) {
    ttsAudio.pause();
    ttsAudio.currentTime = 0;
    btn.textContent = '🔊 Read Aloud';
    btn.classList.remove('playing');
    return;
  }

  // get the actual rendered text from the DOM right now
  const el = document.getElementById('scenarioText');
  const actualText = (el ? (el.innerText || el.textContent) : text).trim();

  if (!actualText || actualText.length < 5) {
    btn.textContent = '⏳ Still generating...';
    setTimeout(() => { btn.textContent = '🔊 Read Aloud'; }, 1500);
    return;
  }

  btn.textContent = '⏳ Loading...';
  btn.classList.add('loading');
  btn.disabled = true;

  try {
    const r = await fetch(TTS_URL + '/tts', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({text: actualText})
    });
    if (!r.ok) throw new Error('Server error ' + r.status);
    const data = await r.json();
    if (data.error) throw new Error(data.error);

    ttsAudio.src = TTS_URL + data.path;
    ttsAudio.onended = () => {
      btn.textContent = '🔊 Read Aloud';
      btn.classList.remove('playing');
    };
    await ttsAudio.play();
    btn.textContent = '⏹ Stop';
    btn.classList.remove('loading');
    btn.classList.add('playing');
  } catch(e) {
    console.error('TTS error:', e);
    btn.textContent = '🔊 Read Aloud';
    btn.classList.remove('loading','playing');
    alert('TTS error: ' + e.message);
  } finally {
    btn.disabled = false;
  }
}
</script>
</body>
</html>
